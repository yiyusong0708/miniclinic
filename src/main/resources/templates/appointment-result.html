<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掛號成功 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        .success-box { background-color: #d1fae5; color: #065f46; padding: 15px; border-radius: 6px; margin-bottom: 20px; font-weight: bold; }
        dl { display: grid; grid-template-columns: 120px 1fr; gap: 10px; background: #f9fafb; padding: 20px; border-radius: 8px; border: 1px solid #e5e7eb; }
        dt { font-weight: bold; color: #4b5563; }
        dd { margin: 0; color: #111827; }
    </style>
</head>
<body>
    <h1>掛號提交完成</h1>

    <div class="success-box">
        恭喜！您的掛號資料已成功寫入診所資料庫。
    </div>

    <div class="summary">
        <h2>掛號明細摘要 (流水號：<span th:text="${appointment.apptId}"></span>)</h2>
        <dl>
            <dt>病歷號碼</dt>
            <dd th:text="${appointment.patient.chartNo}">TEST00001</dd>
            
            <dt>病患姓名</dt>
            <dd th:text="${appointment.patient.name}">姓名</dd>
            
            <dt>看診醫師</dt>
            <dd th:text="${appointment.doctor.name}">醫生姓名</dd>
            
            <dt>看診科別</dt>
            <dd th:text="${appointment.doctor.department}">科別</dd>
            
            <dt>預約日期</dt>
            <dd th:text="${appointment.apptDate}">2026-05-24</dd>
            
            <dt>看診時段</dt>
            <dd th:text="${appointment.timeSlot}">上午診</dd>
            
            <dt>系統狀態</dt>
            <dd th:text="${appointment.status}">BOOKED</dd>
        </dl>
    </div>

    <p><a th:href="@{/}">← 返回系統首頁</a></p>
</body>
</html>
