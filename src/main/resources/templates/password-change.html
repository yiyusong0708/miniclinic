<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MiniClinic - 修改密碼</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white py-3">
                    <h5 class="mb-0">修改個人密碼</h5>
                </div>
                <div class="card-body p-4">
                    
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{/password}" method="post">
                        <div class="mb-3">
                            <label class="form-label">目前在線醫師</label>
                            <input type="text" class="form-control" th:value="${loggedInDoctorName} + ' 醫師'" disabled>
                        </div>
                        
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label">請輸入舊密碼</label>
                            <input type="password" id="oldPassword" name="oldPassword" class="form-control" required placeholder="目前使用的舊密碼">
                        </div>
                        
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">請輸入新密碼（至少 8 個字元）</label>
                            <input type="password" id="newPassword" name="newPassword" class="form-control" required placeholder="欲設定的新密碼">
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">請再次輸入新密碼</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required placeholder="再次輸入新密碼確認">
                        </div>
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/dashboard}" class="btn btn-outline-secondary">返回後台</a>
                            <button type="submit" class="btn btn-primary">確認修改密碼</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
