<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>MiniClinic 社區診所</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            max-width: 960px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #ffffff;
        }

        h1 {
            color: #0F2443;
            border-bottom: 3px solid #14B8A6;
            padding-bottom: 8px;
        }

        nav {
            background: #0F2443;
            padding: 12px;
            border-radius: 8px;
        }

        nav a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #5EEAD4;
        }

        section {
            margin-top: 24px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        li {
            margin-bottom: 8px;
            color: #374151;
        }
    </style>
</head>

<body>
    <h1>MiniClinic 社區診所</h1>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/appointment/new}">線上掛號</a>
        <a th:href="@{/appointments}">掛號紀錄</a> <a th:href="@{/stats}">掛號統計</a>       </nav>
        <a th:href="@{/login}">醫師登入</a>
    <section>
        <p>歡迎蒞臨 MiniClinic。我們提供下列科別的門診服務：</p>
        <ul>
            <li>家醫科 (Family Medicine)</li>
            <li>內科 (Internal Medicine)</li>
            <li>復健科 (Physical Medicine and Rehabilitation)</li>
            <li>小兒科 (Pediatrics)</li>
            <li>身心科 (Psychiatry)</li>
        </ul>
    </section>
</body>

</html>
