<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掛號數據統計 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; background-color: #ffffff; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        nav { background: #0F2443; padding: 12px; border-radius: 8px; margin-bottom: 30px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #5EEAD4; }
        table { border-collapse: collapse; width: 100%; margin-top: 15px; }
        th, td { border: 1px solid #d1d5db; padding: 12px; text-align: left; }
        th { background-color: #f3f4f6; color: #374151; font-weight: bold; }
        .no-data { padding: 20px; text-align: center; color: #9ca3af; font-size: 1.1rem; }
    </style>
</head>
<body>
    <h1>MiniClinic 社區診所</h1>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/appointment/new}">線上掛號</a>
        <a th:href="@{/appointments}">掛號紀錄</a>
        <a th:href="@{/stats}">掛號統計</a>
    </nav>

    <h2>各科別掛號人次統計</h2>

    <table th:if="${not #lists.isEmpty(stats)}">
        <thead>
            <tr>
                <th>科別名稱</th>
                <th>目前掛號人數</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${stats}">
                <td th:text="${row.department}">科別</td>
                <td th:text="${row.count}">0 筆</td>
            </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(stats)}" class="no-data">
        <p>📭 目前資料庫中尚無任何掛號紀錄，統計數據為空。</p>
    </div>
</body>
</html>
