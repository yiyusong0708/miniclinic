<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - MiniClinic</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            max-width: 960px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #14B8A6;
            padding-bottom: 12px;
        }

        h1 {
            color: #0F2443;
            margin: 0;
        }

        .logout-form {
            margin: 0;
        }

        .logout-form button {
            background: #94A3B8;
            color: white;
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-pwd {
            background: #6366F1;
            color: white;
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            margin-right: 10px;
        }

        .btn-cancel {
            background: #EF4444;
            color: white;
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        /* 新增：「看診完成」按鈕的綠色質感樣式 */
        .btn-complete {
            background: #10B981;
            color: white;
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #E2E8F0;
        }

        th {
            background: #0F2443;
            color: white;
        }

        /*  狀態顏色 CSS 完美對應 */
        .status-BOOKED {
            color: #F59E0B;
            font-weight: bold;
        }

        .status-COMPLETED {
            color: #10B981;
            font-weight: bold;
        }

        .status-CANCELLED {
            color: #94A3B8;
        }
    </style>
</head>

<body>
    <header>
        <div>
            <h1>Dashboard</h1>
            <p>歡迎，<span th:text="${doctor.name}"></span>（<span th:text="${doctor.department}"></span>）</p>
        </div>
        <div style="display: flex; align-items: center;">
            <a th:href="@{/password}" class="btn-pwd">修改密碼</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button type="submit">登出</button>
            </form>
        </div>
    </header>

    <h2 th:text="|今日掛號：${today}|"></h2>

    <p th:if="${appointments.isEmpty()}">今日沒有掛號。</p>

    <table th:unless="${appointments.isEmpty()}">
        <thead>
            <tr>
                <th>時段</th>
                <th>病患</th>
                <th>病歷號</th>
                <th>狀態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="appt : ${appointments}">
                <td th:text="${appt.timeSlot}">AM</td>
                <td th:text="${appt.patient.name}">測試病患甲</td>
                <td th:text="${appt.patient.chartNo}">TEST00001</td>

                <td th:text="${appt.status}" th:class="${'status-' + appt.status}">BOOKED</td>

                <td>
                    <button onclick="window.location.reload()" class="btn-complete">看診完成</button>
                    <button onclick="window.location.reload()" class="btn-cancel">取消</button>
                </td>
            </tr>
        </tbody>
    </table>

    <p style="text-align: center; margin-top: 20px;">
        <a th:href="@{/}">← 回首頁</a>
    </p>

    <script>
        // 新增：看診完成的 Ajax 送出邏輯
        function completeAppointment(button) {
            const apptId = button.getAttribute('data-id');

            if (confirm("確定要將這筆掛號標記為「看診完成」嗎？")) {
                fetch('/api/appointments/' + apptId + '/status', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: 'COMPLETED' }) // 傳送 COMPLETED 狀態
                })
                    .then(response => {
                        if (response.ok) {
                            // 成功後依規格要求重新整理頁面
                            window.location.reload();
                        } else if (response.status === 403) {
                            alert("錯誤：您沒有權限修改其他醫師的掛號紀錄！(403 Forbidden)");
                        } else if (response.status === 401) {
                            alert("錯誤：登入逾時或未登入！(401 Unauthorized)");
                        } else {
                            alert("變更狀態失敗，請稍後再試。");
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert("網路或伺服器異常");
                    });
            }
        }

        function cancelAppointment(button) {
            const apptId = button.getAttribute('data-id');

            if (confirm("確定要取消這筆掛號嗎？")) {
                fetch('/api/appointments/' + apptId + '/status', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: 'CANCELLED' })
                })
                    .then(response => {
                        if (response.ok) {
                            window.location.reload();
                        } else if (response.status === 403) {
                            alert("錯誤：您沒有權限修改其他醫師的掛號紀錄！(403 Forbidden)");
                        } else if (response.status === 401) {
                            alert("錯誤：登入逾時或未登入！(401 Unauthorized)");
                        } else {
                            alert("取消失敗，請稍後再試。");
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert("網路或伺服器異常");
                    });
            }
        }
    </script>
</body>

</html>
