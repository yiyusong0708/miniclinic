<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MiniClinic - 修改密碼</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">MiniClinic 醫療後台</a>
        <div class="d-flex align-items-center">
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm me-2">返回看診列表</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
            <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0">變更醫師登入密碼</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/password}" method="post">
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label">目前舊密碼</label>
                            <input type="password" class="form-control" id="oldPassword" name="oldPassword" placeholder="請輸入當前密碼" required>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">設定新密碼</label>
                            <input type="password" class="form-control" id="newPassword" name="newPassword" placeholder="請輸入新密碼" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">再次確認新密碼</label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="請再次輸入新密碼" required>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">確認修改密碼</button>
                            <a th:href="@{/dashboard}" class="btn btn-outline-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
